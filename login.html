<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Фитнес-трекер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 32px;
            text-align: center;
        }

        .auth-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #e9e9ef;
            background: white;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: #6e6e73;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .auth-form {
            padding: 32px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1.5px solid #e9e9ef;
            border-radius: 14px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-primary:hover {
            transform: scale(0.98);
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #c4553c;
            display: block;
        }

        .message.success {
            background: #dcfce7;
            color: #2b6e3c;
            display: block;
        }

        .demo-hint {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: #6e6e73;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Фитнес-трекер</h1>
            <p>Ваш персональный дневник тренировок</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <div id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="loginUsername" placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
            </div>
            <button class="btn-primary" id="loginBtn">Войти</button>
            <div id="loginMessage" class="message"></div>
            <div class="demo-hint">
                Тестовый пользователь: alex_fit / 123456
            </div>
        </div>

        <div id="register-form" class="auth-form">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="regUsername" placeholder="Придумайте логин">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Ваш email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль">
            </div>
            <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showMessage(element, msg, isError = true) {
            element.textContent = msg;
            element.className = 'message ' + (isError ? 'error' : 'success');
        }

        function clearMessage(element) {
            element.textContent = '';
            element.className = 'message';
        }

        // Переключение вкладок
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabId = tab.getAttribute('data-tab');
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                document.getElementById(`${tabId}-form`).classList.add('active');
                
                clearMessage(document.getElementById('loginMessage'));
                clearMessage(document.getElementById('registerMessage'));
            });
        });

        // Регистрация
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msgDiv = document.getElementById('registerMessage');
            
            if (!username || !email || !password) {
                showMessage(msgDiv, 'Заполните все поля');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showMessage(msgDiv, 'Регистрация успешна! Теперь войдите.', false);
                setTimeout(() => {
                    document.querySelector('.auth-tab[data-tab="login"]').click();
                }, 1500);
            } catch (err) {
                showMessage(msgDiv, err.message);
            }
        });

        // Вход
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            
            if (!username || !password) {
                showMessage(msgDiv, 'Заполните все поля');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('currentUser', JSON.stringify({ id: data.userId, username: data.username }));
                window.location.href = 'index.html';
            } catch (err) {
                showMessage(msgDiv, err.message);
            }
        });
    </script>
</body>
</html>
